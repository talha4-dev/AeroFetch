services:
  # ── Backend API (Node.js) ──
  - type: web
    name: aerofetch-api-prod
    runtime: node
    plan: free
    rootDir: backend-new
    buildCommand: npm install
    startCommand: node app.js
    envVars:
      - key: NODE_ENV
        value: production
      - key: PORT
        value: 10000
      - key: USE_MOCK_REDIS
        value: "true"
      - key: USE_SIMULATION
        value: "false"
      - key: CORS_ORIGIN
        value: "https://aerofetch.onrender.com"
      - key: RENDER_NIX_PACKAGES
        value: ffmpeg yt-dlp

  # ── Frontend (Static Site) ──
  - type: static_site
    name: aerofetch
    rootDir: frontend
    buildCommand: npm install && npm run build
    staticPublishPath: dist
    headers:
      - path: /*
        name: Cache-Control
        value: public, max-age=0, must-revalidate
    routes:
      - type: rewrite
        source: /*
        destination: /index.html
