services:
  - type: web
    name: aerofetch-api-prod
    runtime: python
    plan: free
    buildCommand: pip install -r backend/requirements.txt
    startCommand: gunicorn backend.app:app
    envVars:
      - key: PYTHON_VERSION
        value: 3.12.0
      - key: PORT
        value: 10000
      - key: RENDER_NIX_PACKAGES
        value: ffmpeg
